name: PerfectPPI
options:
  bundleIdPrefix: com.perfectppi
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTS_MACCATALYST: NO

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.20.0

targets:
  PerfectPPI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PerfectPPI
        excludes:
          - "**/.DS_Store"
    resources:
      - PerfectPPI/Resources/Assets.xcassets
      - PerfectPPI/Resources/AppConfig.plist
      - PerfectPPI/Resources/PrivacyInfo.xcprivacy
    info:
      path: PerfectPPI/Resources/Info.plist
      properties:
        CFBundleDisplayName: PerfectPPI
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        NSBluetoothAlwaysUsageDescription: PerfectPPI uses Bluetooth to connect to the OBDLink CX adapter and pull diagnostic data from the vehicle.
        NSCameraUsageDescription: PerfectPPI uses the camera so technicians can attach photos to inspection questions.
        NSPhotoLibraryUsageDescription: PerfectPPI lets you pick existing photos to attach to inspection questions.
        NSPhotoLibraryAddUsageDescription: PerfectPPI saves inspection photos you capture to your photo library.
        NSFaceIDUsageDescription: Face ID unlocks PerfectPPI without re-entering your password.
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: com.perfectppi.app
            CFBundleURLSchemes:
              - perfectppi
        LSApplicationQueriesSchemes:
          - https
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.perfectppi.app
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: PerfectPPI/Resources/PerfectPPI.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:perfectppi.com
          - webcredentials:perfectppi.com
    dependencies:
      - package: Supabase
        product: Supabase
    scheme:
      testTargets:
        - PerfectPPITests
        - PerfectPPIUITests
      gatherCoverageData: true

  PerfectPPITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PerfectPPITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PerfectPPI

  PerfectPPIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PerfectPPIUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PerfectPPI
